{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Analíticas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h2 class="text-center mb-4">Panel de Analíticas</h2>

        <div class="row">
            <div class="col-md-6">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title text-center">Ventas por Mes</h5>
                        <canvas id="ventasChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title text-center">Tipo de Clientes</h5>
                        <canvas id="clientesChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <a href="{% url 'dashboard' %}" class="btn btn-primary">Volver al Dashboard</a>
    </div>

    <script>
        const ventasChart = new Chart(document.getElementById('ventasChart'), {
            type: 'bar',
            data: {
                labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun'],
                datasets: [{
                    label: 'Ventas en millones',
                    data: [12, 19, 10, 5, 15, 7],
                    backgroundColor: 'rgba(0, 123, 255, 0.7)',
                    borderColor: 'rgba(0, 123, 255, 1)',
                    borderWidth: 1
                }]
            }
        });

        const clientesChart = new Chart(document.getElementById('clientesChart'), {
            type: 'pie',
            data: {
                labels: ['Nuevos', 'Recurrentes'],
                datasets: [{
                    data: [65, 35],
                    backgroundColor: ['#198754', '#0d6efd']
                }]
            }
        });
    </script>
</body>
</html>
